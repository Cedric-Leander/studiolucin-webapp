    /* ========================================================================
       FARBEN — NUR HIER ÄNDERN. Dunkles Theme, abgestimmt auf den Honorarrechner.
       Regel: Dunkle Flächen tragen helle Schrift; der helle Akzent trägt dunkle.
       ===================================================================== */
    :root {
      --bg:           #0a0b10;  /* Seitenhintergrund (fast schwarz)        */
      --surface:      #10121a;  /* Karte/Bühne hinter dem PDF              */
      --inset:        #080a10;  /* noch dunkler (Vertiefungen)             */
      --ink:          #f2f6ff;  /* Primärtext — hell auf dunklem Grund     */
      --muted:        rgba(215,239,255,0.55);  /* Sekundärtext             */
      --faint:        rgba(215,239,255,0.32);  /* gedämpft                 */
      --line:         rgba(215,239,255,0.10);  /* feine Linien/Rahmen      */
      --line-strong:  rgba(215,239,255,0.28);  /* Rahmen bei Hover/Fokus   */
      --accent:       #d7efff;  /* CI-Akzent (kühles Blau)                 */
      --accent-ink:   #0a0b10;  /* dunkle Schrift auf dem hellen Akzent    */
      --logo-color:   #f2f6ff;  /* Logo hell, damit auf Dunkel sichtbar    */

      --frame:        clamp(16px, 2.2vw, 32px); /* gleichmäßiger Rahmen ums PDF */
      --radius:       0;         /* eckige Kanten                          */
      --maxw:         1500px;
      --font:         "KMRWaldenburg", system-ui, -apple-system, sans-serif;
      --font-display: "KMRWaldenburg Extended", "KMRWaldenburg", system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: var(--font);
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; flex-direction: column; height: 100dvh; }

    /* ---- Kopfzeile ---- */
    .bar {
      flex: 0 0 auto;
      position: relative;
      display: flex; flex-direction: row; align-items: center; justify-content: space-between;
      gap: clamp(14px, 2vw, 24px);
      padding: 18px clamp(16px, 3vw, 28px) 14px;
      border-bottom: 1px solid var(--line);
    }
    .brand { display: flex; align-items: center; justify-content: flex-start; min-width: 0; width: auto; flex: 0 1 300px; }
    /* Logo (eingebettetes SVG). Höhe hier steuern, Farbe via --logo-color oben. */
    .logo { height: 22px; width: auto; max-width: min(280px, 34vw); display: block; flex: 0 1 auto; }
    .logo path { fill: var(--logo-color, #00030c); }
    .suite-nav { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: nowrap; width: auto; margin-left: auto; }
    .suite-link { min-height: 38px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); background: transparent; color: var(--muted); text-decoration: none; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; padding: 10px 13px; white-space: nowrap; transition: border-color .16s ease, color .16s ease, background .16s ease; }
    .suite-link:hover { border-color: var(--line-strong); color: var(--ink); background: color-mix(in oklab, var(--ink) 5%, transparent); }
    .suite-link[aria-current="page"] { border-color: var(--accent); color: var(--accent); }

    .actions { position: static; display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
    .icon-btn {
      width: 38px; height: 38px; display: grid; place-items: center;
      border: 1px solid var(--line); border-radius: var(--radius); background: transparent;
      color: var(--ink); cursor: pointer; text-decoration: none;
      transition: background .15s ease, border-color .15s ease;
    }
    .icon-btn:hover { background: color-mix(in oklab, var(--ink) 6%, transparent); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* ---- Bühne ---- */
    .stage-wrap {
      flex: 1 1 auto; min-height: 0;
      position: relative;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: clamp(14px, 2.4vw, 32px);
    }
    /* Die Karte umschließt das PDF eng mit überall gleichem Abstand (--frame).
       Größe = PDF-Größe + Rahmen; sie wird im Wrap zentriert. */
    .stage {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 0;
      background: transparent;

      max-width: 100%; max-height: 100%;
      /* Mindestgröße nur, solange kein PDF geladen ist (Drop-Fläche): */
      min-width: min(420px, 86vw);
      min-height: clamp(240px, 46vh, 380px);
      overflow: hidden;
    }
    /* feine Akzentlinie oben auf der Karte (Echo aus dem Honorarrechner) */

    .stage.loaded { min-width: 0; min-height: 0; } /* mit PDF: exakt anpassen */
    .stage.drag { outline: 2px dashed var(--accent); outline-offset: -10px; }

    canvas {
      display: block; max-width: 100%; max-height: 100%;
      background: #fff;
      box-shadow: 0 10px 50px rgba(0,0,0,.55);
      opacity: 0; transition: opacity .18s ease;
    }
    canvas.ready { opacity: 1; }

    /* ---- Overlay (Leerzustand / Laden / Fehler) ---- */
    .overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 14px; text-align: center; padding: 24px;
      background: var(--surface);
    }
    .overlay[hidden] { display: none; }
    .overlay p { margin: 0; color: var(--muted); max-width: 36ch; line-height: 1.5; }
    .pick {
      border: 1px solid var(--accent); background: var(--accent); color: var(--accent-ink);
      font: inherit; font-weight: 500; padding: 10px 18px; border-radius: var(--radius); cursor: pointer;
    }
    .spinner {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2.5px solid var(--line); border-top-color: var(--accent);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- Steuerleiste ---- */
    .controls {
      flex: 0 0 auto;
      display: flex; align-items: center; gap: clamp(10px, 2vw, 20px);
      width: 100%; max-width: var(--maxw); margin: 0 auto;
      padding: 0 clamp(16px, 3vw, 32px) 12px;
    }
    .nav-btn {
      flex: 0 0 auto;
      font: inherit; font-weight: 500; cursor: pointer;
      padding: 10px 16px; border-radius: var(--radius); border: 1px solid transparent;
      background: var(--accent); color: var(--accent-ink);
      transition: opacity .15s ease, transform .05s ease;
    }
    .nav-btn:active { transform: translateY(1px); }
    .nav-btn:disabled { opacity: .3; cursor: default; }
    .nav-btn.ghost { background: transparent; color: var(--ink); border-color: var(--line); }
    .nav-btn.ghost:hover:not(:disabled) { border-color: var(--line-strong); }

    .track-area { flex: 1 1 auto; display: flex; align-items: center; gap: 12px; min-width: 0; }
    .counter { font-family: var(--font-display); font-variant-numeric: tabular-nums; font-size: 13px; letter-spacing: 0.02em; color: var(--muted); min-width: 4.5em; }
    .track { flex: 1 1 auto; height: 6px; border-radius: var(--radius); background: var(--line); overflow: hidden; }
    .track > span { display: block; height: 100%; width: 0; background: var(--accent); transition: width .35s ease; }

    .hint {
      flex: 0 0 auto; text-align: center;
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); opacity: .8; padding-bottom: 12px;
    }

    /* Tastatur-Fokus immer sichtbar */
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    #download {
      position: absolute; top: 16px; right: 16px; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      width: 38px; height: 38px;
      border: 1px solid var(--line); background: transparent;
      color: var(--ink); text-decoration: none;
      opacity: 0.45; transition: opacity .2s ease, border-color .15s ease;
    }
    #download:hover { opacity: 1; border-color: var(--line-strong); }
    #download svg { width: 18px; height: 18px; }
    #download[hidden] { display: none !important; }

    @media (max-width: 760px) {
      .bar { flex-direction: column; justify-content: center; gap: 18px; }
      .brand { justify-content: center; width: 100%; flex: none; }
      .logo { height: 20px; max-width: min(300px, 72vw); }
      .suite-nav { justify-content: center; width: 100%; margin-left: 0; flex-wrap: nowrap; }
      .suite-link { flex: 1 1 0; min-width: 0; font-size: 11px; padding: 8px 6px; letter-spacing: .06em; }
      .actions { justify-content: center; }
      .nav-btn .full { display: none; }
      .hint { display: none; }
    }
    @media print { .no-print { display: none !important; } }
    @media (prefers-reduced-motion: reduce) {
      canvas, .track > span { transition: none; }
      .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <div class="app">

        <svg class="logo" viewBox="0 0 1058.812 138.706" role="img" aria-label="Studio Lucin" xmlns="http://www.w3.org/2000/svg">
          <g>

            <path class="cls-1" d="M173.446,50.253h-19.655s0,62.678,0,62.678c0,5.934,1.853,8.715,7.416,8.715h11.313s0,13.908,0,13.908h-14.464c-13.908,0-21.883-3.894-21.883-21.139V50.253s-15.946,0-15.946,0v-13.908s15.946,0,15.946,0V12.424s17.618,0,17.618,0v23.921s19.655,0,19.655,0v13.908Z"/>

            <path class="cls-1" d="M341.332,34.12c13.724,0,25.776,7.232,30.784,14.464h.184V3.152s17.802,0,17.802,0v108.295s.558,24.106.558,24.106h-17.802s-.558-14.093-.558-14.093h-.184c-3.894,8.715-16.133,16.318-31.523,16.318-27.074,0-44.692-19.1-44.692-51.922,0-35.048,20.956-51.737,45.431-51.737ZM344.115,48.028c-19.1,0-30.412,15.762-30.412,37.829,0,22.067,11.313,38.015,30.412,38.015,19.1,0,30.041-15.948,30.041-38.015,0-22.067-10.941-37.829-30.041-37.829Z"/>

            <path class="cls-1" d="M639.826,119.791h62.307s0,15.762,0,15.762h-80.848s0-132.401,0-132.401h18.541s0,116.639,0,116.639Z"/>

            <path class="cls-1" d="M820.374,85.857c0-31.895,17.618-51.737,48.585-51.737,25.96,0,41.722,13.908,43.02,32.266h-17.802c-2.224-11.682-12.052-18.358-25.218-18.358-20.769,0-30.784,15.577-30.784,37.829s10.015,38.015,30.784,38.015c12.795,0,23.736-5.934,25.96-19.285h17.802c-3.338,22.067-21.695,33.193-43.762,33.193-30.968,0-48.585-20.027-48.585-51.922Z"/>
            <path class="cls-1" d="M931.529,22.066V3.152s19.284,0,19.284,0v18.914s-19.284,0-19.284,0ZM932.272,135.553V36.345s17.802,0,17.802,0v99.208s-17.802,0-17.802,0Z"/>
            <path class="cls-1" d="M1058.812,70.094v65.459s-17.802,0-17.802,0v-63.604c0-15.391-8.53-23.921-22.438-23.921-16.688,0-27.258,12.61-27.258,30.226v57.3s-17.802,0-17.802,0V51.551s-.371-15.205-.371-15.205h17.802s.371,15.205.371,15.205h.555c3.522-8.344,14.651-17.431,31.339-17.431,21.324,0,35.604,13.351,35.604,35.974Z"/>

      </a>
      <nav class="suite-nav" aria-label="Bereiche">
        <a class="suite-link" href="../profil/">Profil</a>

        <a class="suite-link" href="../rechner/?intro=1">Rechner</a>
      </nav>
    </header>

    <main class="stage-wrap">
      <a id="download" title="PDF herunterladen" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 11l5 4 5-4M5 21h14"/></svg>
      </a>
      <div class="stage" id="stage">
        <canvas id="canvas"></canvas>
        <div class="overlay" id="overlay">
          <div class="spinner" id="spinner" hidden></div>
          <p id="overlayText">Wird geladen …</p>
          <button class="pick" id="pick" hidden>PDF wählen</button>
        </div>
      </div>
    </main>

    <footer class="controls no-print">
      <button class="nav-btn ghost" id="prev" disabled>← <span class="full">Zurück</span></button>
      <div class="track-area">
        <span class="counter" id="counter">– / –</span>
        <div class="track"><span id="bar"></span></div>
      </div>
      <button class="nav-btn" id="next" disabled><span class="full">Weiter</span> →</button>
    </footer>

    <div class="hint no-print">← → blättern</div>
  </div>

  <input type="file" id="file" accept="application/pdf" hidden />

  <script type="module">
    /* ======================================================================
       KONFIGURATION
       ====================================================================== */
    const CONFIG = {
      // Pfad zum PDF, das automatisch geladen wird. Leer lassen ("") -> es
      // erscheint die Auswahl/Drop-Fläche. Beispiel: "./unternehmensprofil.pdf"
      pdfUrl: "./portfolio.pdf",
      documentTitle: "Portfolio", // Beschriftung oben rechts
      brandName: "Studio Lucin",           // Wortmarke oben links
      downloadName: "studio-lucin-portfolio.pdf",    // Dateiname beim Download
      enableDownload: true,
    };

    /* PDF.js wird vom CDN geladen. Zwei Quellen als Fallback; die erste, die
       funktioniert, gewinnt. Wer keine externe Abhängigkeit will, lädt
       pdf.min.mjs + pdf.worker.min.mjs selbst herunter und ersetzt die URLs. */
    const CDNS = [
      { lib: "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.min.mjs",
        worker: "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.8.69/build/pdf.worker.min.mjs" },
      { lib: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.min.mjs",
        worker: "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.8.69/pdf.worker.min.mjs" },
    ];

    /* ---- Elemente ---- */
    const $ = (id) => document.getElementById(id);
    const stage = $("stage"), canvas = $("canvas"), ctx = canvas.getContext("2d");
    const overlay = $("overlay"), overlayText = $("overlayText"), spinner = $("spinner");
    const prevBtn = $("prev"), nextBtn = $("next"), counter = $("counter"), bar = $("bar");
    const fileInput = $("file"), downloadEl = $("download");

    const eyebrow = $("eyebrow");
    if (eyebrow) eyebrow.textContent = CONFIG.documentTitle;
    document.title = `${CONFIG.brandName} · ${CONFIG.documentTitle}`;

    /* ---- Zustand ---- */
    let pdfjsLib = null;
    let pdfDoc = null, current = 1, total = 0;
    let rendering = false, pending = null;
    let objectUrl = null;

    /* ---- PDF-Engine laden ---- */
    async function loadEngine() {
      for (const c of CDNS) {
        try {
          const mod = await import(c.lib);
          mod.GlobalWorkerOptions.workerSrc = c.worker;
          return mod;
        } catch (_) { /* nächste Quelle versuchen */ }
      }
      throw new Error("engine");
    }

    /* ---- Overlay-Helfer ---- */
    function showLoading() { overlay.hidden = false; spinner.hidden = false; overlayText.textContent = "Wird geladen …"; $("pick").hidden = true; }
    function showEmpty(msg) { overlay.hidden = false; spinner.hidden = true; overlayText.textContent = msg || "PDF hierher ziehen oder Datei wählen."; $("pick").hidden = false; }
    function hideOverlay() { overlay.hidden = true; }

    /* ---- PDF laden ---- */
    async function loadFromUrl(url, attempt = 0) {
      showLoading();
      try { const doc = await pdfjsLib.getDocument(url).promise; onLoaded(doc, url); }
      catch (_) {
        if (attempt < 2) { setTimeout(() => loadFromUrl(url, attempt + 1), 1500); }
        else { showEmpty("PDF konnte nicht geladen werden. Pfad prüfen oder Datei wählen."); }
      }
    }
    async function loadFromFile(file) {
      if (!file || file.type !== "application/pdf") { showEmpty("Bitte eine PDF-Datei wählen."); return; }
      showLoading();
      try {
        const buf = await file.arrayBuffer();
        const doc = await pdfjsLib.getDocument({ data: buf.slice(0) }).promise;
        if (objectUrl) URL.revokeObjectURL(objectUrl);
        objectUrl = URL.createObjectURL(file);
        onLoaded(doc, objectUrl, file.name);
      } catch (_) { showEmpty("Diese Datei ließ sich nicht öffnen."); }
    }

    function onLoaded(doc, src, name) {
      pdfDoc = doc; total = doc.numPages; current = 1;
      if (CONFIG.enableDownload) {
        downloadEl.hidden = false;
        downloadEl.href = src;
        downloadEl.dataset.downloadSrc = src;
        downloadEl.dataset.downloadName = name || CONFIG.downloadName;
        downloadEl.setAttribute("download", name || CONFIG.downloadName);
        downloadEl.setAttribute("role", "button");
        downloadEl.setAttribute("aria-label", "PDF herunterladen");
      }
      stage.classList.add("loaded");
      hideOverlay();
      render(current);
    }

    async function downloadPdf(e) {
      e.preventDefault();
      const src = downloadEl.dataset.downloadSrc || CONFIG.pdfUrl;
      const filename = downloadEl.dataset.downloadName || CONFIG.downloadName || "download.pdf";
      if (!src) return;

      try {
        const res = await fetch(src, { cache: "no-store" });
        if (!res.ok) throw new Error("download");
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (_) {
        // Fallback: öffnet die PDF, falls ein Browser das direkte Herunterladen blockiert.
        window.open(src, "_blank", "noopener");
      }
    }

    /* ---- Seiten-Cache für flüssiges Blättern ---- */
    const pageCache = new Map();

    function calcViewport(page) {
      const wrap = stage.parentElement;
      const wcs = getComputedStyle(wrap);
      const wrapW = wrap.clientWidth  - parseFloat(wcs.paddingLeft) - parseFloat(wcs.paddingRight);
      const wrapH = wrap.clientHeight - parseFloat(wcs.paddingTop)  - parseFloat(wcs.paddingBottom);
      const scs = getComputedStyle(stage);
      const frameX = parseFloat(scs.paddingLeft) + parseFloat(scs.paddingRight);
      const frameY = parseFloat(scs.paddingTop)  + parseFloat(scs.paddingBottom);
      const MAXW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--maxw")) || 1500;
      const availW = Math.min(wrapW, MAXW) - frameX;
      const availH = wrapH - frameY;
      const base = page.getViewport({ scale: 1 });
      const scale = Math.min(availW / base.width, availH / base.height);
      const dpr = window.devicePixelRatio || 1;
      const vp = page.getViewport({ scale: scale * dpr });
      return { vp, cssW: Math.floor(vp.width / dpr), cssH: Math.floor(vp.height / dpr) };
    }

    async function preloadPage(num) {
      if (!pdfDoc || num < 1 || num > total || pageCache.has(num)) return;
      try {
        const page = await pdfDoc.getPage(num);
        const { vp, cssW, cssH } = calcViewport(page);
        const c = document.createElement("canvas");
        c.width = Math.floor(vp.width); c.height = Math.floor(vp.height);
        await page.render({ canvasContext: c.getContext("2d"), viewport: vp }).promise;
        if (!pageCache.has(num)) {
          pageCache.set(num, { canvas: c, cssW, cssH });
          if (pageCache.size > 6) {
            [...pageCache.keys()]
              .sort((a, b) => Math.abs(a - current) - Math.abs(b - current))
              .slice(6).forEach(k => pageCache.delete(k));
          }
        }
      } catch (_) {}
    }

    /* ---- Rendern (an Bühne anpassen, scharf via devicePixelRatio) ---- */
    async function render(num) {
      if (!pdfDoc) return;
      if (rendering) { pending = num; return; }
      rendering = true;
      if (pageCache.has(num)) {
        const { canvas: c, cssW, cssH } = pageCache.get(num);
        canvas.width = c.width; canvas.height = c.height;
        canvas.style.width = cssW + "px"; canvas.style.height = cssH + "px";
        ctx.drawImage(c, 0, 0);
        canvas.classList.add("ready");
        updateChrome();
        rendering = false;
        if (pending !== null) { const n = pending; pending = null; render(n); }
        setTimeout(() => { preloadPage(num + 1); preloadPage(num - 1); }, 50);
        return;
      }

      canvas.classList.remove("ready");
      const page = await pdfDoc.getPage(num);
      const { vp, cssW, cssH } = calcViewport(page);

      canvas.width = Math.floor(vp.width);
      canvas.height = Math.floor(vp.height);
      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";

      await page.render({ canvasContext: ctx, viewport: vp }).promise;
      canvas.classList.add("ready");
      updateChrome();

      const cached = document.createElement("canvas");
      cached.width = canvas.width; cached.height = canvas.height;
      cached.getContext("2d").drawImage(canvas, 0, 0);
      pageCache.set(num, { canvas: cached, cssW, cssH });

      rendering = false;
      if (pending !== null) { const n = pending; pending = null; render(n); }
      setTimeout(() => { preloadPage(num + 1); preloadPage(num - 1); }, 50);
    }

    function updateChrome() {
      counter.textContent = `${String(current).padStart(2, "0")} / ${String(total).padStart(2, "0")}`;
      bar.style.width = total > 1 ? `${((current - 1) / (total - 1)) * 100}%` : "100%";
      prevBtn.disabled = current <= 1;
      nextBtn.disabled = current >= total;
    }


    /* ---- Navigation ---- */
    function go(n) { current = Math.min(Math.max(1, n), total); render(current); }
    prevBtn.addEventListener("click", () => go(current - 1));
    nextBtn.addEventListener("click", () => go(current + 1));
    document.addEventListener("keydown", (e) => {
      if (!pdfDoc) return;
      if (["ArrowRight", "PageDown", " "].includes(e.key)) { e.preventDefault(); go(current + 1); }
      else if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); go(current - 1); }
      else if (e.key === "Home") go(1);
      else if (e.key === "End") go(total);
    });

    downloadEl.addEventListener("click", downloadPdf);

    /* ---- Datei-Eingabe & Drag-and-drop ---- */
    $("pick").addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (e) => loadFromFile(e.target.files[0]));
    stage.addEventListener("dragover", (e) => { e.preventDefault(); stage.classList.add("drag"); });
    stage.addEventListener("dragleave", () => stage.classList.remove("drag"));
    stage.addEventListener("drop", (e) => {
      e.preventDefault(); stage.classList.remove("drag");
      loadFromFile(e.dataTransfer.files[0]);
    });

    /* ---- Bei Größenänderung neu einpassen ---- */
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      pageCache.clear();
      resizeTimer = setTimeout(() => { if (pdfDoc) render(current); }, 120);
    });

    /* ---- Start ---- */
    (async () => {
      try { pdfjsLib = await loadEngine(); }
      catch (_) { showEmpty("PDF-Engine konnte nicht geladen werden (CDN blockiert?). URLs im Code prüfen."); return; }
      if (CONFIG.pdfUrl) loadFromUrl(CONFIG.pdfUrl);
      else showEmpty();
    })();
  </script>
</body>
